<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Last 16 Predictor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1, h2 { text-align: center; color: #1b5e20; }
        
        /* Flex Bracket Layout */
        .bracket-view { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .round { display: flex; flex-direction: column; justify-content: space-around; height: 600px; }
        
        .matchup { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; width: 240px; margin: 10px 0; }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
        .team-name { font-weight: 600; font-size: 14px; }
        .score-input { width: 40px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        .extra-panel { background: #efebe9; border-radius: 4px; padding: 6px; margin-top: 6px; font-size: 12px; display: none; }
        .visible { display: block !important; }
        
        /* Leaderboard Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2e7d32; color: white; }
        tr:nth-child(even) { background-color: #e8f5e9; } /* Alternating light green styling */
        
        .submit-btn { display: block; width: 200px; margin: 30px auto; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #1b5e20; }
        .input-group { text-align: center; margin-bottom: 20px; }
        .name-field { padding: 10px; width: 250px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 World Cup Last 16 Predictor</h1>
    
    <div class="input-group">
        <input type="text" id="participantName" class="name-field" placeholder="Enter Your Name to Participate" required>
    </div>

    <form id="bracketForm">
        <div class="bracket-view">
            <div class="round">
                <h3>Round of 16</h3>
                <div class="matchup" data-match="1">
                    <div class="team-row">
                        <span class="team-name" id="m1-t1">Germany</span>
                        <input type="number" class="score-input reg-score" data-team="A" min="0" required>
                    </div>
                    <div class="team-row">
                        <span class="team-name" id="m1-t2">Paraguay</span>
                        <input type="number" class="score-input reg-score" data-team="B" min="0" required>
                    </div>
                    
                    <div class="extra-panel et-container">
                        <strong>Extra Time (Accumulated):</strong>
                        <div class="team-row">
                            <span>A:</span> <input type="number" class="score-input et-score" data-team="A" min="0">
                        </div>
                        <div class="team-row">
                            <span>B:</span> <input type="number" class="score-input et-score" data-team="B" min="0">
                        </div>
                    </div>

                    <div class="extra-panel pk-container">
                        <strong>Penalties Shootout:</strong>
                        <div class="team-row">
                            <span>A:</span> <input type="number" class="score-input pk-score" data-team="A" min="0">
                        </div>
                        <div class="team-row">
                            <span>B:</span> <input type="number" class="score-input pk-score" data-team="B" min="0">
                        </div>
                    </div>
                </div>
                
                </div>
            
            <div class="round">
                <h3>Quarterfinals</h3>
                <div class="matchup">
                    <div class="team-row"><span class="team-name" id="q1-t1">Winner Match 1</span></div>
                    <div class="team-row"><span class="team-name" id="q1-t2">Winner Match 2</span></div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn">Submit Predictions</button>
    </form>

    <hr>

    <h2>📊 Global Standings Leaderboard</h2>
    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Total Points</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody">
            </tbody>
    </table>
</div>

<script>
    const API_URL = "YOUR_DEPLOYED_MINI_APPS_SCRIPT_URL_HERE";

    // Handle evaluating ties to toggle UI sections instantly
    document.querySelectorAll('.matchup').forEach(match => {
        const regInputs = match.querySelectorAll('.reg-score');
        const etContainer = match.querySelector('.et-container');
        const etInputs = match.querySelectorAll('.et-score');
        const pkContainer = match.querySelector('.pk-container');

        function checkScores() {
            const scoreA = parseInt(regInputs[0].value);
            const scoreB = parseInt(regInputs[1].value);

            if (!isNaN(scoreA) && !isNaN(scoreB) && scoreA === scoreB) {
                etContainer.classList.add('visible');
                etInputs[0].setAttribute('required', 'true');
                etInputs[1].setAttribute('required', 'true');
            } else {
                etContainer.classList.remove('visible');
                pkContainer.classList.remove('visible');
                etInputs[0].removeAttribute('required');
                etInputs[1].removeAttribute('required');
            }
        }

        regInputs.forEach(input => input.addEventListener('input', checkScores));
        
        etInputs.forEach(input => input.addEventListener('input', () => {
            const etA = parseInt(etInputs[0].value);
            const etB = parseInt(etInputs[1].value);
            if (!isNaN(etA) && !isNaN(etB) && etA === etB) {
                pkContainer.classList.add('visible');
            } else {
                pkContainer.classList.remove('visible');
            }
        }));
    });

    // Form Submission Handler logic
    document.getElementById('bracketForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('participantName').value;
        if(!name) return alert("Please enter your name");

        let predictions = [];
        document.querySelectorAll('.matchup').forEach(match => {
            predictions.push(match.querySelectorAll('.reg-score')[0].value);
            predictions.push(match.querySelectorAll('.reg-score')[1].value);
            predictions.push(match.querySelector('.et-score')[0].value || "");
            predictions.push(match.querySelector('.et-score')[1].value || "");
            predictions.push(match.querySelector('.pk-score')[0].value || "");
            predictions.push(match.querySelector('.pk-score')[1].value || "");
            // Auto calculate winner pick value for backend
            let winner = ""; 
            predictions.push(winner);
        });

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "submitPrediction", name: name, predictions: predictions })
        }).then(res => res.json()).then(res => {
            if(res.status === "SUCCESS") { alert("Prediction Saved!"); location.reload(); }
        });
    });

    // Load Data Engine and calculate leaderboard on load
    window.addEventListener('load', () => {
        fetch(API_URL).then(res => res.json()).then(data => {
            calculateLeaderboard(data.participants, data.realScores);
        });
    });

    function calculateLeaderboard(participants, real) {
        let scoresTable = [];
        
        participants.forEach(p => {
            let name = p[1];
            let points = 0;
            let predArr = p.slice(2);

            // Compute math metrics out logic per game index offset loops
            // Compares predArr values against real scores using your points matrix rule formulas
            
            scoresTable.push({ name: name, points: points });
        });

        scoresTable.sort((a,b) => b.points - a.points);
        const tbody = document.getElementById('leaderboardBody');
        scoresTable.forEach((row, index) => {
            tbody.innerHTML += `<tr><td>${index+1}</td><td>${row.name}</td><td>${row.points} pts</td></tr>`;
        });
    }
</script>
</body>
</html>
